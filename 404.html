<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Page not found. Return to the portfolio of Afee Muhammod Wafy.">
    <meta name="robots" content="noindex, follow">
    
    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Font Awesome 6 Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">

    <style>
        /* Custom properties and theme settings */
        :root {
            --bg-gradient: radial-gradient(circle at top, #0a0f1e 0%, #03050b 100%);
            --bg-dark: #03050b;
            --text-primary: #eef5ff;
            --text-secondary: #a0aec0;
            --accent: #0ff;
            --accent-glow: rgba(0, 255, 255, 0.4);
            --glass-bg: rgba(15, 25, 45, 0.55);
            --glass-border: 1px solid rgba(0, 255, 255, 0.15);
            --glass-border-hover: 1px solid rgba(0, 255, 255, 0.4);
            --font-stack: 'Inter', sans-serif;
        }

        /* Base Resets */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: var(--font-stack);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #03050b;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 255, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Main Container - Split Layout */
        .error-container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Left Side - Content */
        .error-content {
            text-align: left;
        }

        /* Logo/Brand */
        .brand {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: 0.5px;
            display: inline-block;
            margin-bottom: 40px;
        }

        .brand .accent {
            color: var(--accent);
        }

        /* Status Code */
        .error-code {
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        /* Main Title */
        .error-title {
            font-size: 4rem;
            font-weight: 900;
            color: var(--text-primary);
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .error-title .highlight {
            color: var(--accent);
            text-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
        }

        /* Description */
        .error-description {
            font-size: 1.15rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            max-width: 460px;
        }

        .error-hint {
            font-size: 0.95rem;
            color: rgba(160, 174, 192, 0.5);
            margin-bottom: 40px;
        }

        /* Button Group */
        .btn-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 36px;
            font-size: 1rem;
            font-weight: 600;
            font-family: var(--font-stack);
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            background: var(--accent);
            border: 1px solid var(--accent);
            color: var(--bg-dark);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .btn-home:hover {
            background: #fff;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.4);
            transform: translateY(-3px);
        }

        .btn-home i {
            transition: transform 0.3s ease;
        }

        .btn-home:hover i {
            transform: translateX(-4px);
        }

        /* Footer */
        .error-footer {
            margin-top: 50px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .error-footer a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .error-footer a:hover {
            color: #fff;
        }

        /* Right Side - Visual */
        .error-visual {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Animated 404 Text */
        .big-404 {
            font-size: 12rem;
            font-weight: 900;
            line-height: 1;
            color: var(--text-primary);
            opacity: 0.05;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
        }

        /* Floating Shapes */
        .floating-icon {
            position: relative;
            z-index: 1;
            width: 200px;
            height: 200px;
            background: rgba(0, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(0, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
            backdrop-filter: blur(10px);
        }

        .floating-icon i {
            font-size: 6rem;
            color: var(--accent);
            filter: drop-shadow(0 0 30px rgba(0, 255, 255, 0.3));
            animation: iconPulse 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* Orbiting dots */
        .orbit-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.3;
            animation: orbit 8s linear infinite;
        }

        .orbit-dot:nth-child(2) {
            width: 8px;
            height: 8px;
            animation-delay: -2s;
            animation-duration: 6s;
            opacity: 0.2;
        }

        .orbit-dot:nth-child(3) {
            width: 16px;
            height: 16px;
            animation-delay: -4s;
            animation-duration: 10s;
            opacity: 0.15;
        }

        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(140px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(140px) rotate(-360deg); }
        }

        /* ===== RESPONSIVE DESIGN ===== */

        /* Tablets and smaller laptops */
        @media (max-width: 968px) {
            .error-container {
                grid-template-columns: 1fr;
                gap: 30px;
                padding: 20px;
                text-align: center;
                max-height: 100vh;
                overflow-y: auto;
            }

            .error-content {
                text-align: center;
                order: 2;
            }

            .error-visual {
                order: 1;
            }

            .error-description {
                max-width: 100%;
                margin-left: auto;
                margin-right: auto;
            }

            .btn-group {
                justify-content: center;
            }

            .error-title {
                font-size: 3rem;
            }

            .floating-icon {
                width: 150px;
                height: 150px;
            }

            .floating-icon i {
                font-size: 4.5rem;
            }

            .big-404 {
                font-size: 8rem;
            }

            @keyframes orbit {
                0% { transform: rotate(0deg) translateX(110px) rotate(0deg); }
                100% { transform: rotate(360deg) translateX(110px) rotate(-360deg); }
            }
        }

        /* Mobile phones */
        @media (max-width: 600px) {
            body {
                padding: 12px;
                overflow: auto;
                align-items: flex-start;
                padding-top: 40px;
            }

            .error-container {
                gap: 20px;
                padding: 10px;
                max-height: none;
                overflow-y: visible;
            }

            .error-title {
                font-size: 2.4rem;
            }

            .error-code {
                font-size: 0.85rem;
                letter-spacing: 2px;
            }

            .error-description {
                font-size: 1rem;
            }

            .error-hint {
                font-size: 0.85rem;
                margin-bottom: 30px;
            }

            .floating-icon {
                width: 120px;
                height: 120px;
            }

            .floating-icon i {
                font-size: 3.5rem;
            }

            .big-404 {
                font-size: 5rem;
            }

            .btn-home {
                padding: 14px 28px;
                font-size: 0.95rem;
                width: 100%;
                justify-content: center;
            }

            .btn-group {
                flex-direction: column;
                width: 100%;
                gap: 12px;
            }

            @keyframes orbit {
                0% { transform: rotate(0deg) translateX(85px) rotate(0deg); }
                100% { transform: rotate(360deg) translateX(85px) rotate(-360deg); }
            }

            .brand {
                font-size: 1.5rem;
                margin-bottom: 25px;
            }

            .error-footer {
                margin-top: 30px;
                font-size: 0.75rem;
            }

            .orbit-dot {
                width: 8px;
                height: 8px;
            }

            .orbit-dot:nth-child(3) {
                width: 10px;
                height: 10px;
            }
        }

        /* Very small phones */
        @media (max-width: 400px) {
            .error-title {
                font-size: 2rem;
            }

            .floating-icon {
                width: 100px;
                height: 100px;
            }

            .floating-icon i {
                font-size: 2.8rem;
            }

            .big-404 {
                font-size: 4rem;
            }

            .btn-home {
                padding: 12px 20px;
                font-size: 0.9rem;
            }

            @keyframes orbit {
                0% { transform: rotate(0deg) translateX(70px) rotate(0deg); }
                100% { transform: rotate(360deg) translateX(70px) rotate(-360deg); }
            }

            .brand {
                font-size: 1.3rem;
                margin-bottom: 20px;
            }
        }

        /* Landscape mode on phones */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                align-items: center;
                padding: 20px;
            }

            .error-container {
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                padding: 10px;
            }

            .error-content {
                text-align: left;
                order: 1;
            }

            .error-visual {
                order: 2;
            }

            .error-title {
                font-size: 2rem;
            }

            .floating-icon {
                width: 100px;
                height: 100px;
            }

            .floating-icon i {
                font-size: 3rem;
            }

            .big-404 {
                font-size: 4rem;
            }

            .brand {
                font-size: 1.2rem;
                margin-bottom: 15px;
            }

            .error-description {
                font-size: 0.9rem;
            }

            .error-hint {
                font-size: 0.8rem;
                margin-bottom: 20px;
            }

            .btn-home {
                padding: 10px 20px;
                font-size: 0.85rem;
            }

            .error-footer {
                margin-top: 20px;
                font-size: 0.7rem;
            }

            @keyframes orbit {
                0% { transform: rotate(0deg) translateX(70px) rotate(0deg); }
                100% { transform: rotate(360deg) translateX(70px) rotate(-360deg); }
            }
        }
    </style>
</head>
<body>

    <div class="error-container">
        
        <!-- Left Side: Content -->
        <div class="error-content">
            
            <!-- Brand -->
            <a href="https://www.amwafy.xyz/" class="brand">
                WAFY<span class="accent">.</span>
            </a>

            <!-- Status -->
            <div class="error-code">
                <i class="fa-solid fa-circle-exclamation" style="margin-right: 6px;"></i>
                404 Error
            </div>

            <!-- Title -->
            <h1 class="error-title">
                Page Not<br><span class="highlight">Found</span>
            </h1>

            <!-- Description -->
            <p class="error-description">
                The page you're looking for doesn't exist or has been moved.
            </p>
            <p class="error-hint">
                Let's get you back on track.
            </p>

            <!-- Button -->
            <div class="btn-group">
                <a href="https://www.amwafy.xyz/" class="btn-home">
                    <i class="fa-solid fa-house"></i>
                    Back to Home
                </a>
            </div>

            <!-- Footer with correct copyright -->
            <div class="error-footer">
                &copy; 2026 Wafy — Built with ❤️ & passion for technology
            </div>

        </div>

        <!-- Right Side: Visual -->
        <div class="error-visual">
            
            <!-- Background 404 -->
            <div class="big-404">404</div>

            <!-- Floating Icon -->
            <div class="floating-icon">
                <i class="fa-solid fa-satellite-dish"></i>
            </div>

            <!-- Orbiting Dots -->
            <div class="orbit-dot"></div>
            <div class="orbit-dot"></div>
            <div class="orbit-dot"></div>

        </div>

    </div>

</body>
</html>
