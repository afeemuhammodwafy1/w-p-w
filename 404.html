<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Afee Muhammod Wafy</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Page not found. Return to the portfolio of Afee Muhammod Wafy.">
    <meta name="robots" content="noindex, follow">
    
    <!-- Google Fonts (Space Grotesk) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome 6.5+ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ═══════════════════════════════════════
           ROOT VARIABLES - Minimal Dark Theme
           ═══════════════════════════════════════ */
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #141414;
            --bg-card: #1a1a1a;
            --text-primary: #f0f0f0;
            --text-secondary: #a8a8a8;
            --text-muted: #6a6a6a;
            --border: rgba(255, 255, 255, 0.04);
            --border-hover: rgba(255, 255, 255, 0.08);
            --font: 'Space Grotesk', sans-serif;
            --radius: 16px;
            --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .error-wrapper {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 50px 50px 40px;
            position: relative;
            overflow: hidden;
        }

        .error-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.01), transparent 70%);
            pointer-events: none;
        }

        /* ─── LEFT SIDE ─── */
        .error-content {
            position: relative;
            z-index: 1;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 30px;
        }

        .brand .accent {
            color: var(--text-muted);
        }

        .error-code {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .error-code i {
            margin-right: 6px;
        }

        .error-title {
            font-size: 3.2rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.05;
            margin-bottom: 14px;
            letter-spacing: -0.02em;
        }

        .error-title .highlight {
            color: var(--text-muted);
            opacity: 0.5;
        }

        .error-desc {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 28px;
            max-width: 400px;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 12px 32px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: var(--font);
            border-radius: 50px;
            text-decoration: none;
            transition: var(--transition);
            background: var(--text-primary);
            color: var(--bg-primary);
            border: none;
            cursor: pointer;
        }

        .btn-home:hover {
            transform: translateY(-2px) scale(1.02);
            opacity: 0.9;
        }

        .btn-home i {
            transition: transform 0.3s ease;
        }

        .btn-home:hover i {
            transform: translateX(-4px);
        }

        .error-footer {
            margin-top: 36px;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .error-footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
            border-bottom: 1px solid transparent;
        }

        .error-footer a:hover {
            color: var(--text-primary);
            border-bottom-color: var(--text-muted);
        }

        /* ─── RIGHT SIDE ─── */
        .error-visual {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .big-404 {
            font-size: 9rem;
            font-weight: 700;
            line-height: 1;
            color: var(--text-primary);
            opacity: 0.03;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            user-select: none;
            pointer-events: none;
            letter-spacing: -0.04em;
        }

        .floating-icon {
            position: relative;
            width: 140px;
            height: 140px;
            background: var(--bg-card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            animation: float 6s ease-in-out infinite;
        }

        .floating-icon i {
            font-size: 3.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
            animation: iconPulse 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-14px) rotate(2deg); }
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .orbit-ring {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 1px solid var(--border);
            animation: spin 20s linear infinite;
            pointer-events: none;
        }

        .orbit-ring:nth-child(2) {
            width: 250px;
            height: 250px;
            animation-duration: 30s;
            animation-direction: reverse;
            opacity: 0.5;
        }

        .orbit-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            opacity: 0.3;
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
        }

        .orbit-dot-2 {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--text-muted);
            opacity: 0.2;
            bottom: -2px;
            left: 30%;
        }

        .orbit-dot-3 {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            opacity: 0.15;
            top: 30%;
            right: -4px;
        }

        @keyframes spin {
            0% { transform: rotate(0); }
            100% { transform: rotate(360deg); }
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 820px) {
            .error-wrapper {
                grid-template-columns: 1fr;
                gap: 30px;
                text-align: center;
                padding: 36px 28px 30px;
            }

            .error-content {
                order: 2;
            }

            .error-visual {
                order: 1;
            }

            .error-desc {
                max-width: 100%;
                margin-left: auto;
                margin-right: auto;
            }

            .btn-home {
                justify-content: center;
            }

            .error-title {
                font-size: 2.6rem;
            }

            .big-404 {
                font-size: 6rem;
            }

            .floating-icon {
                width: 110px;
                height: 110px;
            }

            .floating-icon i {
                font-size: 3rem;
            }

            .orbit-ring {
                width: 160px;
                height: 160px;
            }

            .orbit-ring:nth-child(2) {
                width: 200px;
                height: 200px;
            }
        }

        @media (max-width: 480px) {
            .error-wrapper {
                padding: 28px 18px 24px;
                border-radius: 12px;
            }

            .error-title {
                font-size: 2rem;
            }

            .error-code {
                font-size: 0.6rem;
                letter-spacing: 3px;
            }

            .error-desc {
                font-size: 0.9rem;
            }

            .btn-home {
                width: 100%;
                justify-content: center;
                padding: 12px 24px;
                font-size: 0.8rem;
            }

            .floating-icon {
                width: 90px;
                height: 90px;
            }

            .floating-icon i {
                font-size: 2.4rem;
            }

            .big-404 {
                font-size: 4.5rem;
            }

            .orbit-ring {
                width: 130px;
                height: 130px;
            }

            .orbit-ring:nth-child(2) {
                width: 160px;
                height: 160px;
            }

            .brand {
                font-size: 1.1rem;
                margin-bottom: 20px;
            }

            .error-footer {
                margin-top: 24px;
                font-size: 0.6rem;
            }
        }

        @media (max-height: 600px) and (orientation: landscape) {
            .error-wrapper {
                grid-template-columns: 1fr 1fr;
                gap: 24px;
                padding: 24px 30px;
                text-align: left;
            }

            .error-content {
                order: 1;
            }

            .error-visual {
                order: 2;
            }

            .error-title {
                font-size: 2rem;
            }

            .floating-icon {
                width: 80px;
                height: 80px;
            }

            .floating-icon i {
                font-size: 2rem;
            }

            .big-404 {
                font-size: 4rem;
            }

            .orbit-ring {
                width: 120px;
                height: 120px;
            }

            .orbit-ring:nth-child(2) {
                width: 150px;
                height: 150px;
            }

            .error-desc {
                font-size: 0.85rem;
                margin-bottom: 18px;
            }

            .btn-home {
                padding: 10px 24px;
                font-size: 0.75rem;
            }

            .error-footer {
                margin-top: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="error-wrapper">
        
        <!-- ═══ LEFT SIDE ─── -->
        <div class="error-content">
            <a href="https://www.amwafy.xyz/" class="brand">
                WAFY<span class="accent">.</span>

            <div class="error-code">

            </a>

            <div class="error-footer">

        </div>

        <!-- ═══ RIGHT SIDE ─── -->
        <div class="error-visual">
            <div class="big-404">404</div>
            <div class="orbit-ring">
                <span class="orbit-dot"></span>
                <span class="orbit-dot-2"></span>

            </div>
            <div class="orbit-ring">
                <span class="orbit-dot" style="top:auto;bottom:-3px;left:40%;"></span>
            </div>
            <div class="floating-icon">
                <i class="fa-regular fa-map"></i>
            </div>
        </div>

    </div>

</body>
</html>
